<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="conteudo">
            <img class="login-image" src="logo.jpg/App Icon.png" alt="Logo do Resova+" title="Resova+">
            <h1>Login</h1>
            <p>Insira seu e-mail e senha para continuar</p>
            <form action="pagina_inicial.html" method="post">
                <input type="email" name="email" placeholder="E-mail" required><br>
                <input type="password" name="senha" placeholder="Senha" required><br>
            </form>
            <div class="link">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <br />
            <form action="pagina_inicial.html" method="post">
                <button class="button-A" type="submit">Entrar</button><br>
                <button class="button-B" type="submit"><img src="logo.jpg/logo_google.png"
                        alt="Logo do Google">Entrar com Google</button>
            </form>
            <div class="criar-conta">
                <p>Não tem uma conta? <a href="#">Criar conta</a></p>
            </div>
            <div class="rodape">
                <footer>&copy; 2026 Resolva+. Todos os direitos reservados.</footer>
            </div>
        </div>
    </div>
</body>

</html>
